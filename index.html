<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDI27WbUoQ4sJU_61HqA6EdGKGSSW10H2s",
        authDomain: "hippoman-7cdee.firebaseapp.com",
        databaseURL: "https://hippoman-7cdee-default-rtdb.firebaseio.com",
        projectId: "hippoman-7cdee",
        storageBucket: "hippoman-7cdee.firebasestorage.app",
        messagingSenderId: "506565727859",
        appId: "1:506565727859:web:9e4d16e8f6ed3103b53c06"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "appData", "current");

    let appData = {
        products: [
            { name: "黃金蛋炒飯", price: 100, comm: 35, vol: 0 },
            { name: "高麗菜炒飯", price: 110, comm: 35, vol: 0 },
            { name: "鳳梨炒飯", price: 120, comm: 35, vol: 0 },
            { name: "香腸蛋炒飯", price: 130, comm: 35, vol: 0 },
            { name: "甜玉米炒飯", price: 110, comm: 35, vol: 0 },
            { name: "香腸玉米炒飯", price: 140, comm: 35, vol: 0 },
            { name: "可樂", price: 35, comm: 35, vol: 0 },
            { name: "雪碧", price: 35, comm: 35, vol: 0 },
            { name: "絲絨奶茶", price: 50, comm: 35, vol: 0 },
            { name: "金鑽鳳梨氣泡飲", price: 65, comm: 35, vol: 0 },
            { name: "炒高麗菜", price: 60, comm: 35, vol: 0 },
            { name: "泡菜", price: 40, comm: 35, vol: 0 }
        ],
        costs: { food: {}, other: {} },
        history: []
    };

    const initialFoods = ["米", "蛋", "醬油", "肉", "排骨", "香腸", "鳳梨", "油", "鹽", "味精", "胡椒粉", "蔥", "洋蔥", "胡蘿蔔", "白蘿蔔", "玉米", "芹菜", "高麗菜"];
    const initialOthers = ["飯盒", "盒蓋", "湯盒", "湯蓋", "袋子", "瓦斯", "水費", "電費", "店租"];
    
    function checkInitialCosts() {
        initialFoods.forEach(f => { if(!appData.costs.food[f]) appData.costs.food[f] = [{date: "", price: 0, qty: 0}]; });
        initialOthers.forEach(o => { if(!appData.costs.other[o]) appData.costs.other[o] = [{date: "", price: 0, qty: 0}]; });
    }

    let profitChart, salesChart;

    onSnapshot(docRef, (snap) => {
        if (snap.exists()) {
            appData = snap.data();
            checkInitialCosts(); // 確保新加入的品項也能正常顯示
            renderAll();
        } else {
            checkInitialCosts();
            setDoc(docRef, appData);
        }
    });

    async function sync() { await setDoc(docRef, appData); }

    window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('show');
    window.showPage = (id, btn) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(window.innerWidth <= 768) toggleMenu();
    };

    function renderAll() {
        renderDaily();
        renderProductSettings();
        renderProgressive('food', 'food-container');
        renderProgressive('other', 'other-container');
        renderHistory();
        const s = calculateDash();
        if(profitChart) updateCharts(s);
    }

    function renderDaily() {
        const c = document.getElementById('daily-list'); c.innerHTML = '';
        appData.products.forEach((p, i) => {
            const row = document.createElement('div'); row.className = 'grid-row sales-grid';
            row.innerHTML = `<div style="text-align:left; font-weight:bold;">${p.name}</div><input type="number" class="day-qty" data-index="${i}" value="0"><div>$${p.price}</div><div style="font-weight:bold; color:var(--accent); text-align:center;">${p.vol}</div>`;
            c.appendChild(row);
        });
    }

    window.saveDaily = () => {
        document.querySelectorAll('.day-qty').forEach(input => {
            appData.products[input.dataset.index].vol += (parseFloat(input.value) || 0);
            input.value = 0;
        });
        sync(); alert("雲端同步成功！");
    };

    function renderProductSettings() {
        const c = document.getElementById('product-settings-list'); c.innerHTML = '';
        appData.products.forEach((p, i) => {
            const row = document.createElement('div'); row.className = 'grid-row setting-grid';
            row.innerHTML = `<input type="text" value="${p.name}" onchange="updateProd(${i},'name',this.value)"><input type="number" value="${p.price}" onchange="updateProd(${i},'price',this.value)"><input type="number" value="${p.comm}" onchange="updateProd(${i},'comm',this.value)">`;
            c.appendChild(row);
        });
    }
    window.updateProd = (i, k, v) => { appData.products[i][k] = (k==='name'?v:parseFloat(v)||0); sync(); };

    // 修復標題不見的問題
    function renderProgressive(type, containerId) {
        const container = document.getElementById(containerId); container.innerHTML = '';
        for (let name in appData.costs[type]) {
            let total = 0; appData.costs[type][name].forEach(r => total += (r.price * r.qty));
            const div = document.createElement('div'); div.className = 'card';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="font-weight:bold;">${name}</span>
                    <span style="background:#eee; padding:2px 10px; border-radius:10px; font-size:12px;">$${Math.round(total)}</span>
                </div>
                <div class="grid-header cost-grid">
                    <div>日期</div><div>單價</div><div>數量</div><div>小計</div><div></div>
                </div>
                <div id="list-${type}-${name}"></div>
                <button class="btn-main" style="padding:8px; margin-top:10px; font-size:12px;" onclick="addRow('${type}', '${name}')">+ 新增</button>
            `;
            container.appendChild(div);
            const body = document.getElementById(`list-${type}-${name}`);
            appData.costs[type][name].forEach((r, idx) => {
                const row = document.createElement('div'); row.className = 'grid-row cost-grid';
                row.innerHTML = `<input type="date" value="${r.date}" onchange="updateRecord('${type}','${name}',${idx},'date',this.value)"><input type="number" value="${r.price}" onchange="updateRecord('${type}','${name}',${idx},'price',this.value)"><input type="number" value="${r.qty}" onchange="updateRecord('${type}','${name}',${idx},'qty',this.value)"><div>$${Math.round(r.price*r.qty)}</div><button class="btn-del" onclick="delRow('${type}','${name}',${idx})">×</button>`;
                body.appendChild(row);
            });
        }
    }

    window.addRow = (t, n) => { appData.costs[t][n].push({date: new Date().toISOString().split('T')[0], price: 0, qty: 0}); sync(); };
    window.delRow = (t, n, i) => { appData.costs[t][n].splice(i, 1); if(!appData.costs[t][n].length) appData.costs[t][n]=[{date:"",price:0,qty:0}]; sync(); };
    window.updateRecord = (t, n, i, k, v) => { appData.costs[t][n][i][k] = (k==='date'?v:parseFloat(v)||0); sync(); };

    function calculateDash() {
        let rev = 0; appData.products.forEach(p => rev += (p.price * p.vol) * (1 - p.comm/100));
        let fCost = 0; for(let n in appData.costs.food) appData.costs.food[n].forEach(r => fCost += (r.price * r.qty));
        let oCost = 0; for(let n in appData.costs.other) appData.costs.other[n].forEach(r => oCost += (r.price * r.qty));
        document.getElementById('dash-revenue').innerText = `$ ${Math.round(rev).toLocaleString()}`;
        document.getElementById('dash-cost').innerText = `$ ${Math.round(fCost + oCost).toLocaleString()}`;
        document.getElementById('dash-net').innerText = `$ ${Math.round(rev - (fCost+oCost)).toLocaleString()}`;
        return { rev, fCost, oCost, net: rev - (fCost+oCost) };
    }

    function initCharts() {
        profitChart = new Chart(document.getElementById('profitChart'), {
            type: 'doughnut',
            data: { labels: ['食材', '雜支', '純利'], datasets: [{ data: [0,0,0], backgroundColor: ['#e74c3c', '#9b59b6', '#27ae60'] }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
        salesChart = new Chart(document.getElementById('salesChart'), {
            type: 'bar',
            data: { labels: [], datasets: [{ data: [], backgroundColor: '#f39c12' }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function updateCharts(s) {
        profitChart.data.datasets[0].data = [s.fCost, s.oCost, Math.max(0, s.net)];
        profitChart.update();
        const sorted = [...appData.products].filter(p => p.vol > 0).sort((a, b) => b.vol - a.vol);
        salesChart.data.labels = sorted.map(p => p.name);
        salesChart.data.datasets[0].data = sorted.map(p => p.vol);
        salesChart.update();
    }

    window.archiveMonth = () => {
        if(!confirm("確定結算嗎？數據將歸零並存入歷史紀錄。")) return;
        const s = calculateDash();
        appData.history.push({
            date: new Date().toLocaleDateString(),
            rev: s.rev, fCost: s.fCost, oCost: s.oCost, net: s.net,
            sales: appData.products.filter(p => p.vol > 0).map(p => ({name: p.name, vol: p.vol})),
            foodDetail: Object.keys(appData.costs.food).map(n => {
                let sum = 0; appData.costs.food[n].forEach(r => sum += (r.price*r.qty));
                return {n, total: sum};
            }).filter(i => i.total > 0)
        });
        appData.products.forEach(p => p.vol = 0);
        ['food', 'other'].forEach(t => { for(let n in appData.costs[t]) appData.costs[t][n] = [{date:"", price:0, qty:0}]; });
        sync(); alert("結算完畢！");
    };

    function renderHistory() {
        const c = document.getElementById('history-list');
        // 加入清空按鈕
        const historyHeader = `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
                <span style="font-weight:bold; color:var(--dark);">歷史存檔列表</span>
                <button onclick="clearHistory()" style="background:var(--danger); color:white; border:none; padding:5px 12px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold;">🚫清空記錄</button>
            </div>
        `;
        
        if (!appData.history.length) { 
            c.innerHTML = historyHeader + '<table style="width:100%; border-collapse: collapse;"><tr><td style="padding:20px;color:#999;text-align:center;">暫無紀錄</td></tr></table>'; 
            return; 
        }

        let tableHtml = '<table style="width:100%; border-collapse: collapse; text-align:center;">';
        tableHtml += '<tr style="background:#f8f9fa;font-weight:bold;"><td style="padding:10px;">日期</td><td>營收</td><td>純利</td><td>詳情</td></tr>';
        
        appData.history.slice().reverse().forEach((h, i) => {
            const realIdx = appData.history.length - 1 - i;
            tableHtml += `
                <tr class="history-row" onclick="document.getElementById('det-${realIdx}').style.display = (document.getElementById('det-${realIdx}').style.display === 'block' ? 'none' : 'block')">
                    <td>${h.date}</td><td>$${Math.round(h.rev)}</td><td style="color:var(--success); font-weight:bold;">$${Math.round(h.net)}</td><td style="color:var(--accent);">▾</td>
                </tr>
                <tr>
                    <td colspan="4" style="padding:0;"><div id="det-${realIdx}" class="details-pane">
                        <div class="details-grid">
                            <div><div style="font-weight:bold;margin-bottom:5px;">🍱 銷量</div>${h.sales.map(s=>`<div>${s.name}: ${s.vol}份</div>`).join('')}</div>
                            <div><div style="font-weight:bold;margin-bottom:5px;">💰 支出</div>食材: $${Math.round(h.fCost)}<br>雜支: $${Math.round(h.oCost)}</div>
                        </div>
                    </div></td>
                </tr>`;
        });
        tableHtml += '</table>';
        c.innerHTML = historyHeader + tableHtml;
    }

    // 清空紀錄功能
    window.clearHistory = () => {
        if(confirm("⚠ 注意！這將永久刪除雲端上所有的歷史結算紀錄，無法恢復。\n確定要清空嗎？")) {
            appData.history = [];
            sync();
            alert("歷史紀錄已清空。");
        }
    };

    document.getElementById('daily-date-picker').value = new Date().toISOString().split('T')[0];
    window.onload = () => { initCharts(); renderAll(); };
</script>
