<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炒飯管理 Pro - Firebase 雲端版</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- 請將你的 Firebase 配置貼在此處 ---
        const firebaseConfig = {
          apiKey: "AIzaSyDI27WbUoQ4sJU_61HqA6EdGKGSSW10H2s",
          authDomain: "hippoman-7cdee.firebaseapp.com",
          databaseURL: "https://hippoman-7cdee-default-rtdb.firebaseio.com",
          projectId: "hippoman-7cdee",
          storageBucket: "hippoman-7cdee.firebasestorage.app",
          messagingSenderId: "506565727859",
          appId: "1:506565727859:web:9e4d16e8f6ed3103b53c06"
};
        // ------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "appData", "current");

        // 初始化 Chart.js
        let profitChart, salesChart;

        // 全域數據結構
        window.appData = {
            products: [
                { name: "黃金蛋炒飯", price: 100, comm: 35, vol: 0 },
                { name: "高麗菜炒飯", price: 110, comm: 35, vol: 0 },
                { name: "鳳梨炒飯", price: 120, comm: 35, vol: 0 },
                { name: "香腸蛋炒飯", price: 130, comm: 35, vol: 0 },
                { name: "甜玉米炒飯", price: 110, comm: 35, vol: 0 },
                { name: "香腸玉米炒飯", price: 140, comm: 35, vol: 0 },
                { name: "可樂", price: 35, comm: 35, vol: 0 },
                { name: "雪碧", price: 35, comm: 35, vol: 0 },
                { name: "絲絨奶茶", price: 50, comm: 35, vol: 0 },
                { name: "金鑽鳳梨氣泡飲", price: 65, comm: 35, vol: 0 },
                { name: "炒高麗菜", price: 60, comm: 35, vol: 0 },
                { name: "泡菜", price: 40, comm: 35, vol: 0 }
            ],
            costs: { food: {}, other: {} },
            history: []
        };

        const initialFoods = ["米", "蛋", "醬油", "肉", "排骨", "香腸", "鳳梨", "油", "鹽", "味精", "胡椒粉", "蔥", "洋蔥", "胡蘿蔔", "白蘿蔔", "玉米", "芹菜", "高麗菜"];
        const initialOthers = ["飯盒", "盒蓋", "湯盒", "湯蓋", "袋子", "瓦斯", "水費", "電費", "店租"];
        initialFoods.forEach(f => window.appData.costs.food[f] = [{date: "", price: 0, qty: 0}]);
        initialOthers.forEach(o => window.appData.costs.other[o] = [{date: "", price: 0, qty: 0}]);

        // 雲端存擋功能
        window.saveToCloud = async () => {
            try {
                await setDoc(docRef, window.appData);
                console.log("數據同步至雲端");
            } catch (e) { console.error("雲端存擋失敗", e); }
        };

        // 即時監聽雲端數據
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                window.appData = docSnap.data();
                renderAll();
            } else {
                window.saveToCloud(); // 第一次使用則初始化雲端
            }
        });

        // 頁面渲染邏輯 (與 RWD 版相同)
        window.renderAll = () => {
            renderDaily();
            renderProductSettings();
            renderProgressive('food', 'food-container');
            renderProgressive('other', 'other-container');
            renderHistory();
            const stats = calculateDash();
            if(profitChart) updateCharts(stats);
        };

        // 其餘邏輯封裝... (為了精簡，以下省略與上版本重複之渲染函數，直接在 window 下掛載)
        window.saveDaily = () => {
            document.querySelectorAll('.day-qty').forEach(input => {
                window.appData.products[input.dataset.index].vol += (parseFloat(input.value) || 0);
                input.value = 0;
            });
            window.saveToCloud();
            alert("雲端同步成功！");
        };

        // 初始化圖表
        window.onload = () => {
            initCharts();
            renderAll();
        };
    </script>

    <style>
        /* 沿用上版本的 RWD CSS 樣式 */
        :root { --primary: #f39c12; --dark: #2c3e50; --bg: #f4f7f6; --border: #dee2e6; --success: #27ae60; --danger: #e74c3c; --accent: #3498db; }
        * { box-sizing: border-box; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .mobile-header { display: none; background: var(--dark); color: white; padding: 10px 15px; width: 100%; position: fixed; top: 0; z-index: 1000; justify-content: space-between; align-items: center; }
        .sidebar { width: 230px; background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s ease; z-index: 999; }
        .sidebar.show { transform: translateX(0); }
        .sidebar-header { padding: 25px 20px; text-align: center; font-weight: bold; color: var(--primary); background: rgba(0,0,0,0.2); font-size: 1.2rem; }
        .nav-btn { padding: 15px 20px; border: none; background: none; color: #bdc3c7; text-align: left; cursor: pointer; width: 100%; font-size: 14px; }
        .nav-btn.active { background: #34495e; color: var(--primary); border-left: 4px solid var(--primary); }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); overflow-x: auto; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border-top: 5px solid var(--primary); }
        .chart-container { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .chart-box { flex: 1; min-width: 300px; background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .grid-row { display: grid; gap: 5px; margin-top: 8px; min-width: 450px; }
        .sales-grid { grid-template-columns: 2fr 1fr 0.8fr 1.2fr; }
        .cost-grid { grid-template-columns: 1.4fr 1fr 1fr 0.8fr 0.4fr; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        @media (max-width: 768px) {
            body { flex-direction: column; } .mobile-header { display: flex; }
            .sidebar { position: fixed; top: 50px; left: 0; height: 100vh; transform: translateX(-100%); width: 80%; }
            .main-content { padding: 70px 15px; }
        }
    </style>
</head>
<body>

<div class="mobile-header">
    <div style="font-weight:bold; color:var(--primary);">炒飯雲端管理系統</div>
    <button onclick="document.getElementById('sidebar').classList.toggle('show')" style="background:none; border:1px solid #7f8c8d; color:white; border-radius:4px; padding:5px 10px;">選單</button>
</div>

<!-- 側邊欄與頁面內容與 RWD 版本結構一致，此處略過重複標籤，維持功能按鈕 onclick 呼叫 renderPage -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">雲端版 Pro</div>
    <button class="nav-btn active" onclick="showPage('dash-page', this)">📊 營運總表</button>
    <button class="nav-btn" onclick="showPage('daily-page', this)">✍️ 今日銷量</button>
    <button class="nav-btn" onclick="showPage('food-page', this)">🥬 食材明細</button>
    <button class="nav-btn" onclick="showPage('other-page', this)">📦 雜支明細</button>
    <button class="nav-btn" onclick="showPage('history-page', this)">📜 歷史紀錄</button>
</div>

<div class="main-content">
    <!-- 各分頁細節內容... 同 RWD 版本內容 -->
    <div id="dash-page" class="page active">
        <h2>雲端經營分析</h2>
        <div class="dashboard-grid">
            <div class="stat-card">實領營收<div id="dash-revenue" style="font-weight:bold; font-size:20px;">$ 0</div></div>
            <div class="stat-card">預計支出<div id="dash-cost" style="font-weight:bold; font-size:20px; color:red;">$ 0</div></div>
            <div class="stat-card">預估純利<div id="dash-net" style="font-weight:bold; font-size:20px; color:green;">$ 0</div></div>
        </div>
        <div class="chart-container">
            <div class="chart-box"><canvas id="profitChart"></canvas></div>
            <div class="chart-box"><canvas id="salesChart"></canvas></div>
        </div>
    </div>
    
    <div id="daily-page" class="page">
        <h2>✍️ 今日銷量輸入</h2>
        <div class="card">
            <input type="date" id="daily-date-picker" style="margin-bottom:10px;">
            <div id="daily-list"></div>
            <button class="btn-main" onclick="window.saveDaily()">💾 同步至雲端</button>
        </div>
    </div>
    
    <!-- 其餘分頁內容... -->
</div>

<script>
    // 這裡放入 renderDaily, initCharts, calculateDash 等函數邏輯
    // (與 RWD 版完全相同，只需將裡面所有的 appData 改為 window.appData)
    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sidebar').classList.remove('show');
    }
</script>
</body>
</html>
